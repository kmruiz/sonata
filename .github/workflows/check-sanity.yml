name: Java CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-18.04
    steps:
    - uses: actions/checkout@v2\
    - uses: actions/setup-java@v1
      with:
        java-version: '13'
        architecture: x64
    - uses: actions/setup-node@v1
      with:
        node-version: '12'
    - name: Build with Maven
      run: ./mvnw clean package
